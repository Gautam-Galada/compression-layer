<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" width="920" height="620" style="--bg:#0d1117;--fg:#e6edf3;--line:#30363d;--accent:#58a6ff;--muted:#8b949e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     color-mix(in srgb, var(--fg) 3%, var(--bg));
    --_node-stroke:   color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_group-fill:    color-mix(in srgb, var(--fg) 2%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_pass:          #3fb950;
    --_fail:          #f85149;
    --_gate-fill:     color-mix(in srgb, var(--accent) 6%, var(--bg));
    --_gate-stroke:   color-mix(in srgb, var(--accent) 30%, var(--bg));
  }
</style>
<defs>
  <marker id="ah" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>

<!-- Title -->
<text x="460" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="var(--_text)">Equivalence Evaluation: 3-Gate Scoring</text>
<text x="460" y="50" text-anchor="middle" font-size="11" fill="var(--_text-sec)">Each compression pair is scored independently by each frontier model, then gated for pass/fail</text>

<!-- ═══════ STEP 1: Input pair ═══════ -->
<rect x="32" y="72" width="168" height="76" rx="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="116" y="96" text-anchor="middle" font-size="12" font-weight="600" fill="var(--_text)">Compression Pair</text>
<text x="116" y="114" text-anchor="middle" font-size="10" fill="var(--_text-sec)">verbose (original)</text>
<text x="116" y="128" text-anchor="middle" font-size="10" fill="var(--_text-sec)">compressed (adapter output)</text>

<!-- Arrow from pair to model group -->
<line x1="200" y1="110" x2="248" y2="110" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<!-- ═══════ STEP 2: Frontier model group (repeated x3) ═══════ -->
<rect x="248" y="64" width="640" height="178" rx="8" fill="var(--_group-fill)" stroke="var(--_group-stroke)" stroke-width="0.75" stroke-dasharray="4 2" />
<text x="568" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="var(--_text-muted)">Repeated for each frontier model: Claude Sonnet, GPT-4o-mini, Gemini Flash</text>

<!-- Fact-extraction prompt -->
<rect x="268" y="96" width="136" height="54" rx="5" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="336" y="117" text-anchor="middle" font-size="11" font-weight="500" fill="var(--_text)">Fact-Extraction</text>
<text x="336" y="132" text-anchor="middle" font-size="10" fill="var(--_text-sec)">Prompt</text>

<!-- Two branches: verbose and compressed -->
<!-- Verbose branch -->
<line x1="404" y1="110" x2="436" y2="110" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<rect x="436" y="92" width="112" height="36" rx="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="492" y="114" text-anchor="middle" font-size="10" font-weight="500" fill="var(--_text)">verbose + prompt</text>

<line x1="548" y1="110" x2="580" y2="110" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<rect x="580" y="92" width="112" height="36" rx="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="636" y="107" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_text)">Frontier Model</text>
<text x="636" y="120" text-anchor="middle" font-size="9" fill="var(--_text-sec)">(e.g. Claude)</text>

<line x1="692" y1="110" x2="724" y2="110" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<rect x="724" y="92" width="144" height="36" rx="4" fill="color-mix(in srgb, #1a7f37 8%, var(--bg))" stroke="color-mix(in srgb, #1a7f37 30%, var(--bg))" stroke-width="0.75" />
<text x="796" y="114" text-anchor="middle" font-size="10" font-weight="500" fill="var(--_text)">verbose_output</text>

<!-- Compressed branch -->
<rect x="436" y="144" width="112" height="36" rx="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="492" y="166" text-anchor="middle" font-size="10" font-weight="500" fill="var(--_text)">compressed + prompt</text>

<line x1="404" y1="136" x2="420" y2="150" stroke="var(--_line)" stroke-width="1" />
<line x1="420" y1="150" x2="420" y2="162" stroke="var(--_line)" stroke-width="1" />
<line x1="420" y1="162" x2="436" y2="162" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<line x1="548" y1="162" x2="580" y2="162" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<rect x="580" y="144" width="112" height="36" rx="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="636" y="159" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_text)">Same Model</text>
<text x="636" y="172" text-anchor="middle" font-size="9" fill="var(--_text-sec)">(same prompt)</text>

<line x1="692" y1="162" x2="724" y2="162" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<rect x="724" y="144" width="144" height="36" rx="4" fill="color-mix(in srgb, var(--accent) 8%, var(--bg))" stroke="color-mix(in srgb, var(--accent) 30%, var(--bg))" stroke-width="0.75" />
<text x="796" y="166" text-anchor="middle" font-size="10" font-weight="500" fill="var(--_text)">compressed_output</text>

<!-- Bracket connecting outputs -->
<text x="800" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_text-muted)">compare these two outputs</text>
<line x1="796" y1="130" x2="796" y2="144" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="3 2" />
<line x1="756" y1="196" x2="840" y2="196" stroke="var(--_line)" stroke-width="0.75" />
<line x1="796" y1="182" x2="796" y2="196" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="3 2" />

<!-- Arrow down to gates -->
<line x1="460" y1="242" x2="460" y2="274" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<!-- ═══════ STEP 3: Three gates ═══════ -->
<text x="460" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="var(--_text)">3-Gate Comparison</text>
<text x="460" y="284" text-anchor="middle" font-size="10" fill="var(--_text-sec)">verbose_output vs compressed_output scored three ways</text>

<!-- Gate 1: Embedding -->
<rect x="56" y="300" width="240" height="110" rx="6" fill="var(--_gate-fill)" stroke="var(--_gate-stroke)" stroke-width="0.75" />
<text x="176" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="var(--_text)">Gate 1: Embedding Similarity</text>
<text x="176" y="340" text-anchor="middle" font-size="10" fill="var(--_text-sec)">MiniLM-L6-v2 encodes both outputs,</text>
<text x="176" y="354" text-anchor="middle" font-size="10" fill="var(--_text-sec)">computes cosine similarity.</text>
<text x="176" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_text-muted)">Catches: garbled text, topic drift</text>
<rect x="124" y="386" width="104" height="18" rx="4" fill="color-mix(in srgb, var(--_pass) 12%, var(--bg))" stroke="color-mix(in srgb, var(--_pass) 30%, var(--bg))" stroke-width="0.5" />
<text x="176" y="399" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_pass)">threshold >= 0.60</text>

<!-- Gate 2: Fact Overlap -->
<rect x="340" y="300" width="240" height="110" rx="6" fill="var(--_gate-fill)" stroke="var(--_gate-stroke)" stroke-width="0.75" />
<text x="460" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="var(--_text)">Gate 2: Fact Overlap</text>
<text x="460" y="340" text-anchor="middle" font-size="10" fill="var(--_text-sec)">Extracts atomic facts from each,</text>
<text x="460" y="354" text-anchor="middle" font-size="10" fill="var(--_text-sec)">measures recall-weighted coverage.</text>
<text x="460" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_text-muted)">Catches: dropped facts, numbers</text>
<rect x="408" y="386" width="104" height="18" rx="4" fill="color-mix(in srgb, var(--_pass) 12%, var(--bg))" stroke="color-mix(in srgb, var(--_pass) 30%, var(--bg))" stroke-width="0.5" />
<text x="460" y="399" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_pass)">threshold >= 0.55</text>

<!-- Gate 3: LLM Judge -->
<rect x="624" y="300" width="240" height="110" rx="6" fill="var(--_gate-fill)" stroke="var(--_gate-stroke)" stroke-width="0.75" />
<text x="744" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="var(--_text)">Gate 3: LLM Judge</text>
<text x="744" y="340" text-anchor="middle" font-size="10" fill="var(--_text-sec)">A separate LLM rates whether</text>
<text x="744" y="354" text-anchor="middle" font-size="10" fill="var(--_text-sec)">outputs are semantically equivalent.</text>
<text x="744" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_text-muted)">Catches: reasoning gaps, quality</text>
<rect x="692" y="386" width="104" height="18" rx="4" fill="color-mix(in srgb, var(--_pass) 12%, var(--bg))" stroke="color-mix(in srgb, var(--_pass) 30%, var(--bg))" stroke-width="0.5" />
<text x="744" y="399" text-anchor="middle" font-size="10" font-weight="600" fill="var(--_pass)">threshold >= 0.75</text>

<!-- Arrows from gates down to aggregation -->
<line x1="176" y1="410" x2="176" y2="444" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />
<line x1="460" y1="410" x2="460" y2="444" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />
<line x1="744" y1="410" x2="744" y2="444" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<!-- ═══════ STEP 4: Per-model aggregation ═══════ -->
<rect x="96" y="444" width="728" height="52" rx="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="460" y="466" text-anchor="middle" font-size="12" font-weight="600" fill="var(--_text)">Per-Model Score = min(gate1, gate2, gate3) across tasks</text>
<text x="460" y="482" text-anchor="middle" font-size="10" fill="var(--_text-sec)">Each model gets one score per gate, averaged over 2 task prompts (QA + Reasoning)</text>

<!-- Arrow down -->
<line x1="460" y1="496" x2="460" y2="524" stroke="var(--_line)" stroke-width="1" marker-end="url(#ah)" />

<!-- ═══════ STEP 5: Final verdict ═══════ -->
<rect x="136" y="524" width="648" height="76" rx="8" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="460" y="549" text-anchor="middle" font-size="13" font-weight="700" fill="var(--_text)">Final Verdict</text>
<text x="460" y="568" text-anchor="middle" font-size="11" fill="var(--_text-sec)">PASS only if ALL 3 gates pass for ALL 3 frontier models (worst-case across models)</text>
<text x="460" y="586" text-anchor="middle" font-size="10" fill="var(--_text-muted)">min_equivalence = min of all gate scores across all models</text>
</svg>